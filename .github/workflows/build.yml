name: Build SmartSearchAI.exe

# Runs on every push to main, and can also be triggered manually from the
# Actions tab (the "Run workflow" button) without needing a push.
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    # windows-latest = a clean, GitHub-managed Windows VM with full admin +
    # internet, unrelated to your company's machine/policies -- this is
    # exactly the "other machine" we needed and didn't have.
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download Vietnamese diacritics-restoration model (baked into _internal)
        run: |
          python scripts/download_vi_diacritics_model.py

      - name: Build exe with PyInstaller
        run: |
          pyinstaller SmartSearchAI.spec

      - name: Upload build folder as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartSearchAI-windows
          # onedir build -> dist/SmartSearchAI/ is a FOLDER containing
          # SmartSearchAI.exe plus all its DLLs/data. Upload the whole
          # thing; upload-artifact zips it automatically for download.
          path: dist/SmartSearchAI/
          compression-level: 6
